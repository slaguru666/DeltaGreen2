<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2600 1800" font-family="Courier New, monospace">
  <defs>
    <radialGradient id="snow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#12171c"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </radialGradient>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#1d2a30" stroke-width="1"/>
    </pattern>
    <g id="pine">
      <path d="M0 60 L20 -10 L40 60 Z M6 30 L20 -30 L34 30 Z" fill="#c9d6dd" opacity="0.5"/>
    </g>
    <g id="print">
      <ellipse cx="0" cy="0" rx="11" ry="22" fill="#8aa353" opacity="0.85"/>
    </g>
  </defs>

  <rect width="2600" height="1800" fill="url(#snow)"/>
  <rect width="2600" height="1800" fill="url(#grid)"/>

  <!-- snow speckle -->
  <g fill="#ffffff" opacity="0.10">
    <circle cx="220" cy="330" r="2"/><circle cx="480" cy="900" r="2"/><circle cx="900" cy="220" r="2"/>
    <circle cx="1500" cy="1500" r="2"/><circle cx="2100" cy="500" r="2"/><circle cx="1900" cy="1300" r="2"/>
    <circle cx="700" cy="1400" r="2"/><circle cx="1300" cy="700" r="2"/><circle cx="2300" cy="1000" r="2"/>
    <circle cx="360" cy="1200" r="2"/><circle cx="1750" cy="300" r="2"/><circle cx="1100" cy="1250" r="2"/>
  </g>

  <!-- tree line -->
  <g>
    <use href="#pine" x="120" y="150"/><use href="#pine" x="240" y="120"/><use href="#pine" x="360" y="160"/>
    <use href="#pine" x="1900" y="130"/><use href="#pine" x="2020" y="160"/><use href="#pine" x="2140" y="120"/><use href="#pine" x="2260" y="160"/>
    <use href="#pine" x="120" y="1600"/><use href="#pine" x="260" y="1630"/><use href="#pine" x="2200" y="1600"/><use href="#pine" x="2360" y="1620"/>
    <use href="#pine" x="2380" y="700"/><use href="#pine" x="2420" y="850"/><use href="#pine" x="2400" y="1000"/>
  </g>

  <!-- perimeter fence -->
  <g stroke="#aebcc4" stroke-width="4" fill="none">
    <path d="M400 400 H2200 V1400 H1500"/>
    <path d="M1100 1400 H400 V400"/>
    <!-- chain-link hatch -->
  </g>
  <g stroke="#5c6b73" stroke-width="1" opacity="0.6">
    <path d="M400 400 L2200 400 M400 500 L2200 500 M400 1400 L2200 1400"/>
  </g>

  <!-- CUT in fence (from inside out) -->
  <path d="M400 760 V1040" stroke="#0a0d10" stroke-width="14"/>
  <path d="M360 780 L440 900 L360 1020" stroke="#8aa353" stroke-width="4" fill="none"/>
  <text x="150" y="900" fill="#8aa353" font-size="30" transform="rotate(-90 150 900)">FENCE — CUT OUTWARD</text>

  <!-- gate + cruiser -->
  <path d="M1100 1400 H1500" stroke="#8aa353" stroke-width="6" stroke-dasharray="24 14"/>
  <text x="1160" y="1470" fill="#8aa353" font-size="28">GATE (OPEN)</text>
  <g transform="translate(1300 1230)">
    <rect x="-70" y="-120" width="140" height="240" rx="22" fill="none" stroke="#dfe8ee" stroke-width="4"/>
    <rect x="-52" y="-92" width="104" height="80" fill="none" stroke="#9fb0b8" stroke-width="3"/>
    <rect x="-52" y="18" width="104" height="80" fill="none" stroke="#9fb0b8" stroke-width="3"/>
    <!-- open driver door -->
    <path d="M-70 -30 L-150 -70 L-150 20 L-70 40" fill="none" stroke="#dfe8ee" stroke-width="4"/>
    <text x="0" y="150" fill="#9fb0b8" font-size="24" text-anchor="middle">S.O. CRUISER</text>
    <text x="0" y="176" fill="#5c6b73" font-size="18" text-anchor="middle">door open · frozen · engine dead</text>
  </g>

  <!-- unnatural footprints: driver door into woods, 8ft (~2.4sq) strides -->
  <g>
    <use href="#print" x="1140" y="1200" transform="rotate(-24 1140 1200)"/>
    <use href="#print" x="1010" y="1050" transform="rotate(-24 1010 1050)"/>
    <use href="#print" x="880" y="900" transform="rotate(-24 880 900)"/>
    <use href="#print" x="750" y="760" transform="rotate(-24 750 760)"/>
    <use href="#print" x="600" y="640" transform="rotate(-30 600 640)"/>
    <use href="#print" x="470" y="540" transform="rotate(-30 470 540)"/>
    <text x="640" y="1000" fill="#8aa353" font-size="24" transform="rotate(-24 640 1000)">STRIDES ~8 FT APART</text>
  </g>

  <!-- concrete equipment building -->
  <g transform="translate(760 720)">
    <rect x="0" y="0" width="360" height="260" fill="#0f1418" stroke="#dfe8ee" stroke-width="5"/>
    <rect x="20" y="20" width="320" height="220" fill="none" stroke="#3a474e" stroke-width="2"/>
    <rect x="150" y="240" width="60" height="20" fill="#8aa353"/>
    <text x="180" y="140" fill="#9fb0b8" font-size="26" text-anchor="middle">EQUIPMENT</text>
    <text x="180" y="172" fill="#9fb0b8" font-size="26" text-anchor="middle">BUILDING</text>
    <text x="180" y="284" fill="#8aa353" font-size="18" text-anchor="middle">DOOR</text>
  </g>

  <!-- radar dome (geodesic) -->
  <g transform="translate(1750 780)">
    <circle r="290" fill="#0c1116" stroke="#dfe8ee" stroke-width="6"/>
    <g stroke="#5c6b73" stroke-width="2" fill="none" opacity="0.9">
      <polygon points="0,-290 168,-236 168,236 0,290 -168,236 -168,-236"/>
      <polygon points="0,-160 140,-80 140,80 0,160 -140,80 -140,-80"/>
      <path d="M0,-290 L0,290 M-168,-236 L168,236 M168,-236 L-168,236"/>
      <path d="M0,-160 L168,-236 M0,-160 L-168,-236 M140,-80 L168,236 M-140,-80 L-168,236 M140,80 L0,290 M-140,80 L0,290"/>
    </g>
    <circle r="26" fill="#8aa353"/>
    <text x="0" y="350" fill="#dfe8ee" font-size="30" text-anchor="middle">RADAR DOME</text>
    <text x="0" y="382" fill="#5c6b73" font-size="20" text-anchor="middle">geodesic · catwalk within</text>
  </g>

  <!-- title block -->
  <g transform="translate(40 40)">
    <rect width="560" height="120" fill="#0a0d10" stroke="#8aa353" stroke-width="2"/>
    <text x="20" y="46" fill="#dfe8ee" font-size="34" letter-spacing="3">FAA RADAR STA. — EXTERIOR</text>
    <text x="20" y="80" fill="#8aa353" font-size="22" letter-spacing="2">OPERATION: FALSE ALARM</text>
    <text x="20" y="106" fill="#5c6b73" font-size="18">Northern Maine · heavy snow · 1 sq = 5 ft</text>
  </g>
</svg>
