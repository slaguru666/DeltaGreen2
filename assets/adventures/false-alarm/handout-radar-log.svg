<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" font-family="Courier New, monospace">
  <rect width="1200" height="1200" fill="#04160c"/>
  <!-- radar scope -->
  <g transform="translate(600 600)">
    <circle r="520" fill="#061e10" stroke="#1f7a44" stroke-width="3"/>
    <g stroke="#1f7a44" stroke-width="2" fill="none" opacity="0.7">
      <circle r="130"/><circle r="260"/><circle r="390"/><circle r="500"/>
      <path d="M-520 0 H520 M0 -520 V520 M-368 -368 L368 368 M368 -368 L-368 368"/>
    </g>
    <!-- range labels -->
    <g fill="#3fdc7a" font-size="20" opacity="0.8">
      <text x="140" y="-6">40</text><text x="270" y="-6">80</text><text x="400" y="-6">120</text>
    </g>
    <!-- sweep -->
    <path d="M0 0 L360 -260" stroke="#6bffa6" stroke-width="4" opacity="0.9"/>
    <path d="M0 0 L360 -260 A440 440 0 0 1 300 320 Z" fill="#3fdc7a" opacity="0.10"/>
    <!-- normal contacts -->
    <circle cx="-180" cy="120" r="7" fill="#6bffa6"/>
    <circle cx="90" cy="-300" r="7" fill="#6bffa6"/>
    <!-- THE GEOMETRIC SHADOW over the dish (center) -->
    <g opacity="0.95">
      <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45" fill="none" stroke="#eafff2" stroke-width="3"/>
      <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#eafff2" stroke-width="2"/>
      <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#eafff2" opacity="0.35"/>
      <path d="M0,-90 L0,90 M-78,-45 L78,45 M78,-45 L-78,45" stroke="#eafff2" stroke-width="1.5"/>
    </g>
    <text x="0" y="150" fill="#eafff2" font-size="22" text-anchor="middle" opacity="0.9">UNRESOLVED CONTACT</text>
    <text x="0" y="178" fill="#3fdc7a" font-size="18" text-anchor="middle" opacity="0.8">no transponder · no motion vector</text>
  </g>
  <!-- header/footer text -->
  <text x="40" y="60" fill="#3fdc7a" font-size="26">FAA ASR-11 // TERMINAL LOG — FINAL FRAMES</text>
  <text x="40" y="1130" fill="#eafff2" font-size="22">CLASSIFICATION: &#8220;GEOMETRIC SHADOW&#8221; · alt: N/A · hdg: N/A</text>
  <text x="40" y="1165" fill="#d4553c" font-size="22">SYSTEM FAULT 0xDEAD — CORRUPTED DATA LOOP — CRASH</text>
</svg>
